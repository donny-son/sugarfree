name: Sugarfree

options:
  createIntermediateGroups: true
  minimumXcodeGenVersion: 2.38.0

settings:
  base:
    PRODUCT_NAME: Sugarfree
    PRODUCT_BUNDLE_IDENTIFIER: com.sugarfree.app
    CURRENT_PROJECT_VERSION: 3
    MARKETING_VERSION: 1.2.0
    INFOPLIST_FILE: Sugarfree/Info.plist
    GENERATE_INFOPLIST_FILE: NO
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    SWIFT_VERSION: 6.0
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ENABLE_HARDENED_RUNTIME: YES

targets:
  Sugarfree:
    type: application
    platform: macOS
    configFiles:
      Debug: Configs/Debug.xcconfig
      Release: Configs/Release.xcconfig
    sources:
      - path: Sugarfree
        excludes:
          - Info.plist
          - Fonts
      - path: Sugarfree/Fonts
        type: folder
    settings:
      base:
        PRODUCT_MODULE_NAME: Sugarfree
        CODE_SIGN_ENTITLEMENTS: ""

  SugarfreeTests:
    type: bundle.unit-test
    platform: macOS
    # Logic tests: compile the (pure-Foundation) converter straight into the test
    # module so no app test-host / @testable wiring is needed.
    sources:
      - path: Tests
      - path: Sugarfree/TableConverter.swift
    settings:
      base:
        PRODUCT_NAME: SugarfreeTests
        PRODUCT_MODULE_NAME: SugarfreeTests
        PRODUCT_BUNDLE_IDENTIFIER: com.sugarfree.tests
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: ""
        CODE_SIGN_ENTITLEMENTS: ""

schemes:
  Sugarfree:
    build:
      targets:
        Sugarfree: all
        SugarfreeTests: [test]
    test:
      targets:
        - SugarfreeTests
    run:
      config: Debug
    archive:
      config: Release
