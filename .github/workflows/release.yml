name: Release CLI

# Builds the cross-platform `sugarfree` CLI for every target and attaches the
# archives (+ SHA256 checksums) to the GitHub Release for the pushed tag.
#
# This is additive: the macOS *app* DMG is still produced by release.sh and is
# untouched here.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-universal
            os: macos-latest
            setup_swift: false
            build: swift build -c release --arch arm64 --arch x86_64 --product sugarfree
            bin: .build/apple/Products/Release/sugarfree
            archive: tar
          - name: linux-x86_64
            os: ubuntu-latest
            setup_swift: true
            build: swift build -c release --static-swift-stdlib --product sugarfree
            bin: .build/release/sugarfree
            archive: tar
          - name: linux-arm64
            os: ubuntu-24.04-arm
            setup_swift: true
            build: swift build -c release --static-swift-stdlib --product sugarfree
            bin: .build/release/sugarfree
            archive: tar
          - name: windows-x86_64
            os: windows-latest
            setup_swift: true
            build: swift build -c release --product sugarfree
            bin: .build/release/sugarfree.exe
            archive: zip
    runs-on: ${{ matrix.os }}
    # Swift-on-Windows CI is the least stable leg; don't let it block the others.
    continue-on-error: ${{ matrix.name == 'windows-x86_64' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Swift
        if: matrix.setup_swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.10"

      - name: Build
        run: ${{ matrix.build }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-dev}"
          DIST="sugarfree-${VERSION}-${{ matrix.name }}"
          mkdir -p "dist/${DIST}"
          cp "${{ matrix.bin }}" "dist/${DIST}/"
          cp README.md LICENSE cli/README.md "dist/${DIST}/" 2>/dev/null || true
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "${DIST}.zip" "${DIST}" >/dev/null
            ASSET="${DIST}.zip"
          else
            tar -czf "${DIST}.tar.gz" "${DIST}"
            ASSET="${DIST}.tar.gz"
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ASSET}" > "${ASSET}.sha256"
          else
            shasum -a 256 "${ASSET}" > "${ASSET}.sha256"
          fi
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
